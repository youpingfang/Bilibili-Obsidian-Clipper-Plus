<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsidian Clipper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="top">
        <strong>网页剪藏</strong>
        <button id="settingsBtn" type="button" class="ghost">设置</button>
      </header>

      <p id="status" class="status">准备就绪</p>

      <div class="section-title">属性</div>
      <section class="props">
        <div class="prop-row"><span class="k">title</span><span id="propTitle" class="v"></span></div>
        <div class="prop-row"><span class="k">url</span><span id="propUrl" class="v"></span></div>
        <div class="prop-row"><span class="k">created</span><span id="propCreated" class="v"></span></div>
        <div class="prop-row"><span class="k">tags</span><span id="propTags" class="v"></span></div>
      </section>

      <label class="label" for="subtitleSelect">字幕语言</label>
      <select id="subtitleSelect"></select>

      <section class="split-preview" aria-label="内容和 AI 总结">
        <div class="preview-pane" data-source="subtitle">
          <label class="label" for="preview">内容预览</label>
          <textarea id="preview" readonly wrap="off"></textarea>
        </div>
        <div class="preview-pane ai-pane" data-source="ai">
          <div class="ai-head">
            <label class="label" for="aiSummary">AI 总结</label>
            <select id="aiPromptSelect" class="ai-prompt-select" aria-label="AI 提示词"></select>
            <button id="summarizeBtn" type="button" class="mini-btn summarize-btn">总结</button>
          </div>
          <textarea id="aiSummary" wrap="off" placeholder="点击“总结”后显示 AI 分析结果"></textarea>
        </div>
      </section>

      <div class="actions">
        <button id="refreshBtn" type="button">刷新</button>
        <button id="copyBtn" type="button">复制</button>
        <button id="downloadBtn" type="button">下载</button>
        <button id="readingViewBtn" type="button">阅读</button>
      </div>
      <button id="sendBtn" type="button" class="send">保存到 Obsidian</button>
      <p id="message" class="message"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
